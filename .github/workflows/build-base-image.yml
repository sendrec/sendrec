name: Build Base Image

on:
  workflow_dispatch:
    inputs:
      whisper_version:
        description: 'whisper.cpp version tag'
        required: true
        default: 'v1.8.3'
  push:
    branches: [main]
    paths: ['Dockerfile.base']

permissions:
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine whisper version
        id: version
        run: echo "whisper=${{ github.event.inputs.whisper_version || 'v1.8.3' }}" >> "$GITHUB_OUTPUT"

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          build-args: WHISPER_VERSION=${{ steps.version.outputs.whisper }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sendrec-base:${{ steps.version.outputs.whisper }}
            ${{ secrets.DOCKERHUB_USERNAME }}/sendrec-base:latest
            ghcr.io/sendrec/sendrec-base:${{ steps.version.outputs.whisper }}
            ghcr.io/sendrec/sendrec-base:latest
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base
