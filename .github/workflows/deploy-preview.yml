name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  deploy:
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.author_association != 'NONE' &&
      github.event.pull_request.author_association != 'FIRST_TIMER' &&
      github.event.pull_request.author_association != 'FIRST_TIME_CONTRIBUTOR'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Update preview app branch
        run: |
          curl -sf -X PATCH "${{ secrets.COOLIFY_API_URL }}/applications/${{ secrets.COOLIFY_SENDREC_PREVIEW_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"git_branch": "${{ github.head_ref }}"}'

      - name: Deploy preview via Coolify
        run: |
          curl -sf -X GET "${{ secrets.COOLIFY_API_URL }}/deploy?uuid=${{ secrets.COOLIFY_SENDREC_PREVIEW_UUID }}&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const url = 'https://preview.app.sendrec.eu';
            const body = `Preview deployed: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.startsWith('Preview deployed:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  teardown:
    if: >-
      github.event.action == 'closed' &&
      github.event.pull_request.author_association != 'NONE' &&
      github.event.pull_request.author_association != 'FIRST_TIMER' &&
      github.event.pull_request.author_association != 'FIRST_TIME_CONTRIBUTOR'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Stop preview app
        run: |
          curl -sf -X POST "${{ secrets.COOLIFY_API_URL }}/applications/${{ secrets.COOLIFY_SENDREC_PREVIEW_UUID }}/stop" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"

      - name: Reset preview branch to main
        run: |
          curl -sf -X PATCH "${{ secrets.COOLIFY_API_URL }}/applications/${{ secrets.COOLIFY_SENDREC_PREVIEW_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"git_branch": "main"}'

      - name: Comment PR cleanup
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: 'Preview environment cleaned up.',
            });
