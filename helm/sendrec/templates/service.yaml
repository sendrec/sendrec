apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}
spec:
  type: {{ .Values.sendrec.service.type }}
  selector:
    app: {{ .Chart.Name }}
    instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.sendrec.service.port }}
      targetPort: http
      name: http
